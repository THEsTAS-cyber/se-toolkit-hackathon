services:
  backend:
    build:
      context: ./backend
      additional_contexts:
        workspace: .
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - ${BACKEND_HOST_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-42001}:${BACKEND_CONTAINER_PORT:-8000}
    environment:
      - NAME=${BACKEND_NAME:-App Service}
      - DEBUG=${BACKEND_DEBUG:-false}
      - ADDRESS=${BACKEND_CONTAINER_ADDRESS:-0.0.0.0}
      - PORT=${BACKEND_CONTAINER_PORT:-8000}
      - RELOAD=${BACKEND_RELOAD:-false}
      - UVICORN_HOST=${BACKEND_CONTAINER_ADDRESS:-0.0.0.0}
      - UVICORN_PORT=${BACKEND_CONTAINER_PORT:-8000}
      - UVICORN_RELOAD=${BACKEND_RELOAD:-false}
      - CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-[]}
      - DB_HOST=${CONST_POSTGRESQL_SERVICE_NAME:-postgres}
      - DB_PORT=${CONST_POSTGRESQL_DEFAULT_PORT:-5432}
      - DB_NAME=${POSTGRES_DB:-db-app}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}postgres:17.4
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-db-app}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - ${POSTGRES_HOST_ADDRESS:-127.0.0.1}:${POSTGRES_HOST_PORT:-42004}:${CONST_POSTGRESQL_DEFAULT_PORT:-5432}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/app/data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-db-app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}dpage/pgadmin4:latest
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
    ports:
      - ${PGADMIN_HOST_ADDRESS:-127.0.0.1}:${PGADMIN_HOST_PORT:-42003}:80
    depends_on:
      postgres:
        condition: service_healthy

  frontend-user:
    build:
      context: ./frontend-user
    restart: unless-stopped
    networks:
      - app-network
    environment:
      - BACKEND_URL=http://backend:${BACKEND_CONTAINER_PORT:-8000}
    depends_on:
      - backend

  # ── Nanobot — AI agent with MCP tools ──
  nanobot:
    build:
      context: ./nanobot
      additional_contexts:
        workspace: .
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - ${NANOBOT_HOST_ADDRESS:-127.0.0.1}:${NANOBOT_HOST_PORT:-42006}:${NANOBOT_CONTAINER_PORT:-8765}
    volumes:
      - ./nanobot/workspace:/app/nanobot/workspace
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-demo-key}
      - LLM_API_BASE_URL=http://qwen-code-api:${QWEN_CODE_API_CONTAINER_PORT:-8080}/v1
      - LLM_API_MODEL=${LLM_API_MODEL:-coder-model}
      - NANOBOT_GATEWAY_CONTAINER_ADDRESS=0.0.0.0
      - NANOBOT_GATEWAY_CONTAINER_PORT=18790
      - NANOBOT_ACCESS_KEY=${NANOBOT_ACCESS_KEY:-projectset-secret-key}
      - NANOBOT_LMS_BACKEND_URL=http://backend:${BACKEND_CONTAINER_PORT:-8000}
      - NANOBOT_LMS_API_KEY=${LMS_API_KEY:-change-me}
    depends_on:
      - backend
      - qwen-code-api

  # ── Qwen Code API — LLM proxy ──
  qwen-code-api:
    build:
      context: ./qwen-code-api
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - ${QWEN_CODE_API_HOST_ADDRESS:-127.0.0.1}:${QWEN_CODE_API_HOST_PORT:-42005}:${QWEN_CODE_API_CONTAINER_PORT:-8080}
    volumes:
      - ~/.qwen:/home/nonroot/.qwen:ro
    environment:
      - PORT=${QWEN_CODE_API_CONTAINER_PORT:-8080}
      - ADDRESS=${QWEN_CODE_API_CONTAINER_ADDRESS:-0.0.0.0}
      - DEFAULT_MODEL=${QWEN_CODE_API_MODEL:-coder-model}
      - LOG_LEVEL=${QWEN_CODE_API_LOG_LEVEL:-error}
      - MAX_RETRIES=${QWEN_CODE_API_MAX_RETRIES:-5}
      - RETRY_DELAY_MS=${QWEN_CODE_API_RETRY_DELAY_MS:-1000}
      - QWEN_CODE_AUTH_USE=${QWEN_CODE_API_AUTH_USE:-true}
      - LOG_REQUESTS=${QWEN_CODE_API_LOG_REQUESTS:-true}
      - QWEN_CODE_API_KEY=${QWEN_CODE_API_KEY:-}
    command: ["python", "-m", "qwen_code_api.main"]
    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - |
          import urllib.request
          urllib.request.urlopen('http://localhost:${QWEN_CODE_API_CONTAINER_PORT:-8080}/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  caddy:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}caddy:2.11-alpine
    networks:
      - app-network
    depends_on:
      - backend
      - frontend-user
      - postgres
      - qwen-code-api
    environment:
      - CADDY_CONTAINER_PORT=${CADDY_CONTAINER_PORT:-80}
      - BACKEND_CONTAINER_PORT=${BACKEND_CONTAINER_PORT:-8000}
      - CONST_PGADMIN_CONTAINER_PORT=${CONST_PGADMIN_CONTAINER_PORT:-80}
      - QWEN_CODE_API_CONTAINER_PORT=${QWEN_CODE_API_CONTAINER_PORT:-8080}
    ports:
      - ${GATEWAY_HOST_ADDRESS:-0.0.0.0}:${GATEWAY_HOST_PORT:-42002}:${CADDY_CONTAINER_PORT:-80}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile

volumes:
  postgres_data:

networks:
  app-network:
    name: app-network
    attachable: true
